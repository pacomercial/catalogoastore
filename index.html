<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Araújo Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Araújo Store</h1>
    <p>Moda feminina e masculina</p>
  </header>

  
  <div class="abas">
    <button class="aba-btn" onclick="abrirAba('feminino')">Feminino</button>
    <button class="aba-btn" onclick="abrirAba('masculino')">Masculino</button>
  </div>

  
  <div id="feminino" class="conteudo-aba">
    <div id="produtos-feminino" class="produtos"></div>
  </div>

  
  <div id="masculino" class="conteudo-aba" style="display:none">
    <div id="produtos-masculino" class="produtos"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
